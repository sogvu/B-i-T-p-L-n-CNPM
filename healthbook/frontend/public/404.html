<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HealthBook</title>
  <script>
    // GitHub Pages SPA fix: redirect 404s back to index.html
    // preserving the path so React Router can handle it
    var segmentCount = 1; // số segment của base path: /B-i-T-p-L-n-CNPM/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
